# GoReleaser config for lidspeculum.
# Docs: https://goreleaser.com
#
# A tag push (vX.Y.Z) triggers .github/workflows/release.yml, which runs this to
# cross-compile the binaries, write checksums, and publish a GitHub Release.
#
# It does NOT push to the Homebrew tap or Scoop bucket, so it needs no secret
# beyond the workflow's built-in GITHUB_TOKEN. Those two manifests are
# maintained by hand and point at the release archives below. See RELEASING.md.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: lidspeculum
    binary: lidspeculum
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

# Homebrew: the formula is hand-maintained in NorthShoreSoftwareLabs/homebrew-tap.
# GoReleaser's `brews` is deprecated in favor of macOS-only Homebrew casks, which
# would drop Linux support, so we keep a cross-platform formula by hand instead.
# See RELEASING.md for the template (it points at these release archives).

release:
  github:
    owner: NorthShoreSoftwareLabs
    name: lidspeculum
